# MySQL datasource for Docker environment
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-db}:3306/${MYSQL_DATABASE:usuarios_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# H2 console disabled in docker profile (optional)
spring.h2.console.enabled=false
