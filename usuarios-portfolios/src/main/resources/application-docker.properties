# MySQL datasource for Docker environment
spring.datasource.url=jdbc:mysql://mysql-db:3306/usuarios_db?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# H2 console disabled in docker profile (optional)
spring.h2.console.enabled=false

# Keycloak configuration for Docker
keycloak.serverUrl=http://keycloak:8180
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8180/realms/users-tp
