# MySQL datasource for Docker environment
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-db}:3306/${MYSQL_DATABASE:compraventa_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://keycloak:8188/realms/users-tp}

# URIs de los microservicios externos para cuando corra en Docker
servicios.usuarios.url=usuarios-portfolios:8081
servicios.cotizaciones.url=servicio-yahoo-api-finance:8084
