server.port=8085
spring.application.name=compra-venta

# --- Base de Datos H2 (para desarrollo) ---
spring.datasource.url=jdbc:h2:mem:compraventa
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA/Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Security OAuth2 ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/users-tp
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/users-tp/protocol/openid-connect/certs

# --- Feign Client ---
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# --- URLs de Servicios ---
servicios.usuarios.url=http://localhost:8081
servicios.cotizaciones.url=http://localhost:8084

