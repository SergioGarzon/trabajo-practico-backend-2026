# CONFIGURACIÓN DE LA APLICACIÓN
spring.application.name=compra-venta

# CONFIGURACIÓN DE LA BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/compras_ventas_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA / HIBERNATE
# 'update' es ideal para desarrollo (crea/modifica tablas automáticamente según tus entidades)
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/users-tp

server.port=8089