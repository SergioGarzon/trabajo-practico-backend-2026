# CONFIGURACION DE LA APLICACION
spring.application.name=compra-venta

# CONFIGURACION DE LA BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/compraventa_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACION DE JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace

# SEGURIDAD - OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/users-tp

# PUERTO DEL SERVIDOR
server.port=8088

# URIs de los microservicios externos (Feign Clients)
servicios.usuarios.url=localhost:8081
servicios.cotizaciones.url=localhost:8084
