      dockerfile: Dockerfile
    container_name: tp-compra-venta
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8089
      - MYSQL_HOST=mysql-db
      - MYSQL_DATABASE=compras_ventas_db
