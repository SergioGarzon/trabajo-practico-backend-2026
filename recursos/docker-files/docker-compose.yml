version: '3.8'

services:
  # --- 1. KEYCLOAK (En puerto 8180 y conectado a MySQL) ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: tp-keycloak-auth
    # Mantenemos el comando del nuevo archivo para forzar el puerto 8180
    command: start-dev --http-port=8180
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # Persistencia en base de datos que armamos anteriormente
      - KC_DB=mysql
      - KC_DB_URL=jdbc:mysql://mysql-db:3306/keycloak_db?createDatabaseIfNotExist=true
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=root
    ports:
      - "8180:8180"
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      - mysql-db
    networks:
      - tp-network
    restart: unless-stopped

  # --- 2. BASE DE DATOS UNIFICADA ---
  mysql-db:
    image: mysql:8.0
    container_name: contenedor-mysql2
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuarios_db
    volumes:
      - mysql_data:/var/lib/mysql
      # Script para que cree 'keycloak_db' automáticamente al iniciar
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tp-network
    restart: unless-stopped

  # --- 3. TU BACKEND DE JAVA ---
  usuarios-portfolios-service:
    build:
      context: ../../usuarios-portfolios
      dockerfile: Dockerfile
    container_name: tp-usuarios-portfolios
    ports:
      - "8081:8081"
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_DATABASE=usuarios_db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    depends_on:
      - mysql-db
    networks:
      - tp-network
    restart: unless-stopped

  # --- 4. MÉTRICAS: PROMETHEUS ---
  prometheus:
    image: prom/prometheus:v2.35.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - .:/etc/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/PROMETHEUS.yml"
    networks:
      - tp-network

  # --- 5. MÉTRICAS: GRAFANA ---
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tp-network

volumes:
  keycloak_data:
    driver: local
  mysql_data:
    driver: local

networks:
  tp-network:
    driver: bridge