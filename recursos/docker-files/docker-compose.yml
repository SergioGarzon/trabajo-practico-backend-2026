version: '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: contenedor-mysql2
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuarios_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tp-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: tp-keycloak-auth
    command: start-dev --http-port=8180
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=mysql
      - KC_DB_URL=jdbc:mysql://mysql-db:3306/keycloak_db?createDatabaseIfNotExist=true
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=root
    ports:
      - "8180:8180"
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      - mysql-db
    networks:
      - tp-network
    restart: unless-stopped

  usuarios-portfolios-service:
    build:
      context: ../../usuarios-portfolios
      dockerfile: Dockerfile
    container_name: tp-usuarios-portfolios
    ports:
      - "8081:8081"
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_DATABASE=usuarios_db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/users-tp
    depends_on:
      - mysql-db
      - keycloak
    networks:
      - tp-network
    restart: unless-stopped

  compra-venta-service:
    build:
      context: ../../compra-venta
      dockerfile: Dockerfile
    container_name: tp-compra-venta
    ports:
      - "8082:8082"
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/users-tp
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8180/realms/users-tp/protocol/openid-connect/certs
      - SERVICIOS_USUARIOS_URL=http://usuarios-portfolios-service:8081
      - SERVICIOS_COTIZACIONES_URL=http://cotizaciones-service:8084
    depends_on:
      - mysql-db
      - keycloak
      - usuarios-portfolios-service
    networks:
      - tp-network
    restart: unless-stopped

  cotizaciones-service:
    build:
      context: ../../servicio-yahoo-api-finance
      dockerfile: Dockerfile
    container_name: tp-cotizaciones
    ports:
      - "8084:8084"
    networks:
      - tp-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: tp-api-gateway
    ports:
      - "8083:8083"
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/users-tp
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8180/realms/users-tp/protocol/openid-connect/certs
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://cotizaciones-service:8084
      - SPRING_CLOUD_GATEWAY_ROUTES_2_URI=http://usuarios-portfolios-service:8081
      - SPRING_CLOUD_GATEWAY_ROUTES_3_URI=http://compra-venta-service:8082
    depends_on:
      - keycloak
      - usuarios-portfolios-service
      - compra-venta-service
      - cotizaciones-service
    networks:
      - tp-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.35.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - .:/etc/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/PROMETHEUS.yml"
    networks:
      - tp-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tp-network

volumes:
  keycloak_data:
    driver: local
  mysql_data:
    driver: local

networks:
  tp-network:
    driver: bridge