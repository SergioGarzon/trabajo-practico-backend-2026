server.port=8083
spring.application.name=api-gateway

# Yahoo finance
spring.cloud.gateway.routes[0].id=servicio-yahoo-api-finance
spring.cloud.gateway.routes[0].uri=http://localhost:8084
spring.cloud.gateway.routes[0].predicates[0]=Path=/servidormock/api/v1/**

# Usuarios Portfolios
spring.cloud.gateway.routes[1].id=usuarios-portfolios-service
# Como ambos corren dentro de Docker, usamos el nombre del contenedor
spring.cloud.gateway.routes[1].uri=http://usuarios-portfolios:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/usuarios/**
spring.cloud.gateway.routes[1].filters[0]=TokenRelay

# Enlaces de validación de seguridad hacia tu Keycloak en Docker
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/users-tp
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/users-tp/protocol/openid-connect/certs
